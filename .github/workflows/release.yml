name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v0.4.5 && git push origin v0.4.5
on:
  push:
    tags:
      - "v*"

# Needs write access to create a GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python / PyInstaller ────────────────────────────────────────────────

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt pyinstaller

      - name: Build PyInstaller bundle
        working-directory: backend
        run: pyinstaller junglecoach.spec --clean --noconfirm

      # ── Node / electron-builder ─────────────────────────────────────────────

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: overlay/package-lock.json

      - name: Install overlay dependencies
        working-directory: overlay
        run: npm ci

      # electron-builder publishes directly to GitHub Releases (creates the
      # release, uploads the .exe, latest.yml, and .blockmap).
      # latest.yml is required by electron-updater so users get auto-updates.
      - name: Build and publish NSIS installer
        working-directory: overlay
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
